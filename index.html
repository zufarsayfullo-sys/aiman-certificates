<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aiman Korean — Certificates</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #FAFAF8; min-height: 100vh; }
    .topbar { background: white; border-bottom: 1px solid rgba(0,0,0,0.08); padding: 12px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
    .topbar svg { width: 36px; height: 36px; flex-shrink: 0; }
    .topbar-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .topbar-sub { font-size: 11px; color: #C0392B; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .content { padding: 16px; }
    .count { font-size: 12px; color: #6B6B6B; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .card:active { transform: scale(0.97); }
    .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; background: #f0f0f0; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-img { max-width: 100%; max-height: 95vh; border-radius: 8px; object-fit: contain; }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .loading { text-align: center; padding: 60px 20px; color: #6B6B6B; font-size: 14px; grid-column: 1/-1; }
    .error-box { grid-column: 1/-1; background: #fff3f3; border: 1px solid #ffcccc; border-radius: 12px; padding: 16px; font-size: 13px; color: #c0392b; line-height: 1.6; }
    .error-box a { color: #c0392b; font-weight: 600; }
  </style>
</head>
<body>

  <div class="topbar">
    <svg viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
      <circle cx="65" cy="65" r="62" fill="white" stroke="#C0392B" stroke-width="3"/>
      <path d="M65 22 A22 22 0 0 1 65 66 A22 22 0 0 0 65 110 A44 44 0 0 1 65 22Z" fill="#C0392B"/>
      <path d="M65 22 A44 44 0 0 0 65 110 A22 22 0 0 1 65 66 A22 22 0 0 0 65 22Z" fill="#003478"/>
      <circle cx="65" cy="44" r="11" fill="#C0392B"/><circle cx="65" cy="44" r="4.5" fill="white"/>
      <circle cx="65" cy="88" r="11" fill="#003478"/><circle cx="65" cy="88" r="4.5" fill="white"/>
      <g stroke="#1a1a2e" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="30" x2="28" y2="30"/><line x1="18" y1="34" x2="28" y2="34"/><line x1="18" y1="38" x2="28" y2="38"/>
        <line x1="102" y1="30" x2="112" y2="30"/><line x1="102" y1="34" x2="112" y2="34"/><line x1="107" y1="38" x2="112" y2="38"/><line x1="102" y1="38" x2="105" y2="38"/>
        <line x1="18" y1="92" x2="28" y2="92"/><line x1="20" y1="96" x2="25" y2="96"/><line x1="18" y1="100" x2="28" y2="100"/>
        <line x1="102" y1="92" x2="112" y2="92"/><line x1="102" y1="96" x2="112" y2="96"/><line x1="102" y1="100" x2="112" y2="100"/>
      </g>
    </svg>
    <div>
      <div class="topbar-title">Aiman Korean</div>
      <div class="topbar-sub">Student Certificates</div>
    </div>
  </div>

  <div class="content">
    <div class="count" id="count"></div>
    <div class="grid" id="grid">
      <div class="loading">Loading... 🎓</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal" onclick="closeModal()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img class="modal-img" id="modal-img" src="" alt="Certificate"/>
  </div>

  <script>
    // ✅ PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-qXFZQqiby_lh_2KWK1m3gYEg21o0ac2NAy_iMqFX-LNLPSsxQ_IBcU4qDKjW4JK-/exec';

    async function loadCertificates() {
      try {
        const resp = await fetch(APPS_SCRIPT_URL);
        const files = await resp.json();

        if (!Array.isArray(files) || files.length === 0) {
          document.getElementById('count').textContent = '0 certificates';
          document.getElementById('grid').innerHTML = '<div class="loading">No certificates yet 🎓</div>';
          return;
        }

        document.getElementById('count').textContent = files.length + ' certificate' + (files.length !== 1 ? 's' : '');

        document.getElementById('grid').innerHTML = files.map(f => `
          <div class="card" onclick="openModal('https://lh3.googleusercontent.com/d/${f.id}')">
            <img src="https://lh3.googleusercontent.com/d/${f.id}" alt="${f.name}" loading="lazy"/>
          </div>`).join('');

      } catch(err) {
        document.getElementById('grid').innerHTML = `
          <div class="error-box">
            ⚠️ Could not load certificates.<br><br>
            Make sure you have set up the Google Apps Script and pasted the Web App URL into this file.<br><br>
            <a href="#" onclick="loadCertificates()">Try again</a>
          </div>`;
      }
    }

    function openModal(url) {
      document.getElementById('modal-img').src = url;
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('modal-img').src = '';
    }

    loadCertificates();
  </script>
</body>
</html>
